name: Restrict issue creation to maintainers

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue if author is not an org member
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.issue.user.login;
            let isMember = false;

            try {
              await github.rest.orgs.checkMembershipForUser({
                org: 'offline-lab',
                username: author,
              });
              isMember = true;
            } catch {
              isMember = false;
            }

            if (!isMember) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  "Thanks for the interest! This repository is in early development and",
                  "issue creation is currently restricted to org maintainers.",
                  "",
                  "If you have a question or found a bug, please reach out via",
                  "[offline-lab.com](https://offline-lab.com).",
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                lock_reason: 'off-topic',
              });
            }
