---


{{- $architecture := .architecture }}
{{- $suite        := .suite }}
{{- $mirror       := .mirror }}
{{- $apt_proxy    := .apt_proxy }}

architecture: {{ $architecture }}

environment:
  http_proxy: {{ $apt_proxy }}
  https_proxy: {{ $apt_proxy }}

actions:
- action: debootstrap
  suite: {{ $suite }}
  components:
  - main
  - contrib
  - non-free
  merged-usr: true
  mirror: {{ $mirror }}
  variant: minbase

- action: apt
  chroot: true
  packages:
  - apt-utils
  - gnupg
  - gpgv
  - ca-certificates
