---

{{- $architecture := .architecture }}
{{- $suite        := .suite        }}
{{- $version      := .version      }}
{{- $source       := .source       }}
{{- $config_dir   := .config_dir   }}

architecture: {{ $architecture }}

actions:
- action: run
  description: Create offline-lab metadata directory
  chroot: false
  command:
    install -m 0755 -o 0 -g 0 -d "$ROOTDIR"/{{ $config_dir }}

- action: run
  description: Update build time metadata file
  chroot: false
  command: |
    date '+%H%M%S' > /tmp/build-time;
    install -m 0644 -o 0 -g 1000 /tmp/build-time "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Update build time metadata file
  chroot: false
  command: |
    date '+%Y%m%d' > /tmp/build-date;
    install -m 0644 -o 0 -g 1000 /tmp/build-date "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Update build architecture metadata file
  chroot: false
  command: |
    printf "%s\n" "{{ $architecture }}" > /tmp/build-arch;
    install -m 0644 -o 0 -g 1000 /tmp/build-arch "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Update build suite metadata file
  chroot: false
  command: |
    printf "%s\n" "{{ $suite }}" > /tmp/build-suite;
    install -m 0644 -o 0 -g 1000 /tmp/build-suite "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Update build source metadata file
  chroot: false
  command: |
    debos --version > /tmp/build-tool;
    install -m 0644 -o 0 -g 1000 /tmp/build-tool "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Update build source metadata file
  chroot: false
  command: |
    printf '%s\n' "{{ $source }}" > /tmp/build-source;
    install -m 0644 -o 0 -g 1000 /tmp/build-source "$ROOTDIR"/{{ $config_dir }}/

- action: run
  description: Create /etc/issue and /etc/issue.net
  chroot: false
  command: |
    echo 'Offline-Lab {{ $version }} \n \l' > /tmp/issue;
    install -m 0644 -o 0 -g 1000 /tmp/issue "$ROOTDIR"/etc/issue;
    install -m 0644 -o 0 -g 1000 /tmp/issue "$ROOTDIR"/etc/issue.net;

- action: run
  description: Display IP address at login prompt
  chroot: false
  command:
    sed -i -e '1s/$/ \\4 \\6/' "$ROOTDIR"/etc/issue
