---

{{- $architecture := .architecture }}

architecture: {{ $architecture }}

actions:
- action: overlay
  description: Copy files for rasperry pi boot
  source: ../overlays/install-firmware

- action: run
  description: Install RPi boot firmware (Debian)
  chroot: false
  command: |
    cp -av "${ROOTDIR}"/usr/lib/raspi-firmware/bootcode.bin "${ROOTDIR}"/boot/firmware/
    cp -av "${ROOTDIR}"/usr/lib/raspi-firmware/fixup.dat    "${ROOTDIR}"/boot/firmware/
    cp -av "${ROOTDIR}"/usr/lib/raspi-firmware/start.elf    "${ROOTDIR}"/boot/firmware/

- action: run
  description: Copy DTBs for the kernel
  chroot: false
  command: |
    cp -av "${ROOTDIR}"/usr/lib/linux-image-*-rpi-v8/broadcom/bcm2710-rpi-zero-2-w.dtb "${ROOTDIR}"/boot/firmware/
    cp -av "${ROOTDIR}"/usr/lib/linux-image-*-rpi-v8/broadcom/bcm2837-rpi-zero-2-w.dtb "${ROOTDIR}"/boot/firmware/

- action: run
  description: Remove RPi firmware package
  chroot: true
  command:
    dpkg -P raspi-firmware
