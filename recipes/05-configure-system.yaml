---

{{- $architecture := .architecture }}

architecture: {{ $architecture }}

actions:
- action: overlay
  description: Install default settings (timezone, locale, keyboard, fstab, motd)
  source: ../overlays/configure-system/

- action: run
  description: "Create /etc/mtab symlink to /proc/mounts"
  chroot: false
  command:
    ln -nsf /proc/mounts "$ROOTDIR"/etc/mtab

- action: run
  description: Mask services that set the cpu-governor to on-demand
  chroot: true
  command: systemctl mask raspi-config.service cpufrequtils.service

- action: run
  description: Set the default to nongraphical mode
  chroot: true
  command: systemctl set-default multi-user.target

- action: run
  description: "Purge all locales"
  chroot: true
  command:
    dpkg-reconfigure -fnoninteractive localepurge

- action: run
  description: Set CHASSIS as embedded in /etc/machine-info
  chroot: false
  command:
    printf "CHASSIS=\"embedded\"\n" >> "$ROOTDIR"/etc/machine-info

- action: run
  description: Set HARDWARE_VENDOR to "OFFLINE LABS"
  chroot: false
  command:
    printf "HARDWARE_VENDOR=\"OFFLINE LABS\"\n" >> "$ROOTDIR"/etc/machine-info
