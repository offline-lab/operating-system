---

{{- $architecture := .architecture }}
{{- $suite        := .suite  }}

architecture: {{ $architecture }}

actions:
- action: run
  description: Run a full upgrade, purge, autoremove and clean apt cycle
  chroot: true
  command: |
    apt-get --yes update --allow-releaseinfo-change;
    apt-get --yes dist-upgrade --no-install-recommends --auto-remove --purge;
    apt-get --yes autoremove;
    apt-get --yes clean;

- action: run
  description: Full clean
  chroot: true
  command: |
    apt-get clean || true

- action: run
  description: Set /etc/machine-id to uninitialized
  chroot: false
  command: |
    printf 'uninitialized\n' > "$ROOTDIR"/etc/machine-id;

    rm -f \
      "$ROOTDIR/var/lib/dbus/machine-id" \
      "$ROOTDIR/var/lib/systemd/random-seed" \
      "$ROOTDIR/var/lib/systemd/credential.secret"

- action: run
  description: Strip all image baggage, logs, secrets and leftover state
  chroot: false
  command: |

    if [ -e "$ROOTDIR/etc/ld.so.preload" ]; then
      mv "$ROOTDIR/etc/ld.so.preload" "$ROOTDIR/etc/ld.so.preload.disabled"
    fi

    # -------------------------------------------------------------------------
    # Boot artefacts
    # -------------------------------------------------------------------------
    rm -rf \
      "$ROOTDIR"/boot/*-rpi-2712 \
      "$ROOTDIR"/boot/*-rpi-v8 \
      "$ROOTDIR"/boot/config* \
      "$ROOTDIR"/boot/initrd.img* \
      "$ROOTDIR"/boot/System.map* \
      "$ROOTDIR"/boot/vmlinuz*

    # -------------------------------------------------------------------------
    # /usr/share baggage
    # keep: man, ca-certificates, zoneinfo, misc
    # -------------------------------------------------------------------------
    rm -rf \
      "$ROOTDIR/usr/share/doc" \
      "$ROOTDIR/usr/share/info" \
      "$ROOTDIR/usr/share/lintian" \
      "$ROOTDIR/usr/share/bug" \
      "$ROOTDIR/usr/share/common-licenses" \
      "$ROOTDIR/usr/share/pixmaps" \
      "$ROOTDIR/usr/share/applications" \
      "$ROOTDIR/usr/share/icons"

    # Strip locales — keep C, C.UTF-8, en_US, en_US.UTF-8
    find "$ROOTDIR/usr/share/locale" -mindepth 1 -maxdepth 1 -type d \
      ! -name 'C' \
      ! -name 'C.UTF-8' \
      ! -name 'en_US' \
      ! -name 'en_US.UTF-8' \
      -exec rm -rf {} +

    # -------------------------------------------------------------------------
    # /etc state leftovers
    # -------------------------------------------------------------------------
    rm -rf \
      "$ROOTDIR/etc/cron.d" \
      "$ROOTDIR/etc/cron.daily" \
      "$ROOTDIR/etc/cron.hourly" \
      "$ROOTDIR/etc/cron.monthly" \
      "$ROOTDIR/etc/cron.weekly" \
      "$ROOTDIR/etc/crontab" \
      "$ROOTDIR/etc/at.deny"

    rm -f \
      "$ROOTDIR/etc/passwd-" \
      "$ROOTDIR/etc/group-" \
      "$ROOTDIR/etc/shadow-" \
      "$ROOTDIR/etc/gshadow-" \
      "$ROOTDIR/etc/subuid-" \
      "$ROOTDIR/etc/subgid-" \
      "$ROOTDIR/etc/network/interfaces.dpkg-old"

    # SSH host keys — regenerated on first boot
    rm -f "$ROOTDIR"/etc/ssh/ssh_host_*_key*

    # -------------------------------------------------------------------------
    # QEMU static binaries (build-time only)
    # -------------------------------------------------------------------------
    rm -f \
      "$ROOTDIR/usr/bin/qemu-arm-static" \
      "$ROOTDIR/usr/bin/qemu-arm-binfmt" \
      "$ROOTDIR/usr/bin/qemu-aarch64-static"

    # -------------------------------------------------------------------------
    # Python bytecode
    # -------------------------------------------------------------------------
    find "$ROOTDIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
    find "$ROOTDIR" -type f -name '*.pyc' -delete 2>/dev/null || true

    # -------------------------------------------------------------------------
    # dpkg/apt residue files
    # -------------------------------------------------------------------------
    find "$ROOTDIR" -type f \( \
      -name '*.dpkg-old' -o \
      -name '*.dpkg-dist' -o \
      -name '*.dpkg-new' -o \
      -name '*.dpkg-tmp' \
    \) -delete 2>/dev/null || true

    # -------------------------------------------------------------------------
    # Root home crud
    # -------------------------------------------------------------------------
    rm -rf \
      "$ROOTDIR/root/.gnupg" \
      "$ROOTDIR/root/.cache"

    # -------------------------------------------------------------------------
    # man-db
    # -------------------------------------------------------------------------
    rm -f "$ROOTDIR/var/lib/man-db/auto-update"

    # -------------------------------------------------------------------------
    # Logs — zero all files, keep structure for systemd
    # -------------------------------------------------------------------------
    find "$ROOTDIR/var/log/" -type f -exec cp /dev/null {} \;
    cp /dev/null "$ROOTDIR/var/log/wtmp"
    cp /dev/null "$ROOTDIR/var/log/lastlog"

    # -------------------------------------------------------------------------
    # Temp dirs — clear content, keep the dirs
    # -------------------------------------------------------------------------
    find "$ROOTDIR/tmp"     -mindepth 1 -delete 2>/dev/null || true
    find "$ROOTDIR/var/tmp" -mindepth 1 -delete 2>/dev/null || true
