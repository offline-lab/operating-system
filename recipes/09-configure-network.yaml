---

{{- $architecture := .architecture }}

architecture: {{ $architecture }}

actions:
- action: run
  description: "Enable predictable network interface names and network manager"
  chroot: true
  command:
    raspi-config nonint do_net_names 1

- action: run
  description: "Disable wifi-check in bash profile"
  chroot: false
  command: |
    if [ -e "$ROOTDIR"/etc/profile.d/wifi-check.sh ] ; then
        mv "$ROOTDIR"/etc/profile.d/wifi-check.sh "$ROOTDIR"/etc/profile.d/wifi-check.sh.bak;
    fi
