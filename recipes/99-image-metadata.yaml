---

{{- $architecture := .architecture }}
{{- $suite        := .suite }}
{{- $image_dir    := .image_dir }}
{{- $image_size   := .image_size }}
{{- $image_file   := .image_file }}

architecture: {{ $architecture }}

actions:
- action: run
  description: Create checksum for generated image
  postprocess: true
  command: |
    md5sum "$ARTIFACTDIR"/"{{ $image_file }}".img \
      | cut -d ' ' -f1 \
      > "$ARTIFACTDIR"/"{{ $image_file }}".img.md5sum.txt

- action: run
  description: Create block map file
  postprocess: true
  command:
    bmaptool create
    -o "$ARTIFACTDIR"/{{ $image_file }}.bmap
    "$ARTIFACTDIR/{{ $image_file }}".img

- action: run
  description: Compress map file
  postprocess: true
  command:
    pigz --force -9 "$ARTIFACTDIR"/{{ $image_file }}.bmap

- action: run
  description: Generate SBOM
  command:
    syft -q
      --source-name "{{ $image_file }}"
      --source-version "{{ $image_file }}"
      -o spdx-json="$ARTIFACTDIR"/{{ $image_file }}-sbom.json
      "$ROOTDIR"

- action: run
  description: Generate vulnerability report
  command:
    grype -q
      -o json="$ARTIFACTDIR"/{{ $image_file }}-vulnerability-report.json
      "$ARTIFACTDIR"/{{ $image_file }}-sbom.json

- action: run
  description: Compress image with gzip
  postprocess: true
  command:
    pigz --force  -9 "$ARTIFACTDIR"/{{ $image_file }}.img

- action: run
  description: Create checksum for compressed image
  postprocess: true
  command: |
    md5sum "$ARTIFACTDIR"/"{{ $image_file }}".img.gz \
      | cut -d ' ' -f1 \
      > "$ARTIFACTDIR"/"{{ $image_file }}".img.gz.md5sum.txt

- action: pack
  description: Pack rootfs into tarball
  file: {{ $image_file }}-rootfs.tar.gz
