---

{{- $architecture := .architecture }}
{{- $hostname     := .hostname }}

architecture: {{ $architecture }}

actions:
- action: run
  description: Set hostname
  chroot: false
  command:
    printf "%s\n" "offline-node"
    > "$ROOTDIR"/etc/hostname

- action: run
  description: Add hostname to /etc/hosts
  chroot: false
  command:
    sed -i -e 's/%HOSTNAME%/{{ $hostname }}/g'
      "$ROOTDIR"/etc/hosts
