[project]

site_name = "Offline Lab"
site_description = "Open tools for offline and air-gapped computing environments."
site_author = "Offline Lab"
site_url = "https://offline-lab.com/docs/"
home_page_url = "https://offline-lab.com"

copyright = "Copyright &copy; 2026 Offline Lab"

repo_name = "offline-labs/builder"
repo_url  = "https://github.com/offline-lab/builder"
edit_uri  = "https://github.com/offline-lab/builder/edit/main/docs/"
docs_dir = "docs"
site_dir = "docs/public/docs"

nav = [
  { "Home" = "index.md" },

  { "Tutorials" = [
    { "Getting Started" = "getting-started.md" },
  ]},

  { "How-to Guides" = [
    { "Burn image to SD card" = "burn-image.md" },
    { "Build the image" = "build-image.md" },
  ]},

  { "Reference" = [
    { "Hardware" = "hardware.md" },
    { "Operating System" = "operating-system.md" },
    { "Boot" = "boot.md" },
    { "Configuration" = "configuration.md" },
    { "Boot partition config" = "bootfs-config.md" },
    { "Packages" = "packages.md" },
    { "Components" = "components.md" },
    { "Disco" = "disco.md" },
    { "App format" = "app-format.md" },
  ]},

  { "Explanation" = [
    { "About" = "about.md" },
    { "Offline design" = "offline.md" },
    { "Roadmap" = "roadmap.md" },
  ]},

  { "Contributing" = [
    { "How to contribute" = "contributing.md" },
    { "Development guide" = "development.md" },
    { "Builder reference" = "builder.md" },
  ]},

  { "Framework" = [
    { "Overview" = "framework/index.md" },
    { "Integration" = "framework-integration.md" },
    { "Commands" = "framework/commands.md" },
    { "Variables" = "framework/var.md" },
    { "Strings" = "framework/string.md" },
    { "Arrays" = "framework/array.md" },
    { "Arguments" = "framework/arguments.md" },
    { "Filesystem" = "framework/fs.md" },
    { "Files" = "framework/files.md" },
    { "Network" = "framework/net.md" },
    { "WiFi" = "framework/wifi.md" },
    { "SSH" = "framework/ssh.md" },
    { "SSL" = "framework/ssl.md" },
    { "Process" = "framework/proc.md" },
    { "Dependencies" = "framework/depends.md" },
    { "Cache" = "framework/cache.md" },
    { "Time" = "framework/time.md" },
    { "Credentials" = "framework/credentials.md" },
    { "Interaction" = "framework/interact.md" },
    { "Prettytable" = "framework/prettytable.md" },
    { "System" = "framework/system.md" },
    { "Config" = "framework/config.md" },
    { "Health" = "framework/health.md" },
    { "Power" = "framework/power.md" },
    { "RAUC" = "framework/rauc.md" },
    { "Core" = "framework/core.md" },
    { "Import" = "framework/import.md" },
    { "Logging" = "framework/logging.md" },
    { "Exit" = "framework/exit.md" },
    { "Debug" = "framework/debug.md" },
    { "Sanity" = "framework/sanity.md" },
  ]},
]

[project.theme]
language = "en"
custom_dir = "docs/overrides"
features = [
    "content.code.copy",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "announce.dismiss",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/offline-lab"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
