# Create admin home directories under /data after the data mount is active.
# systemd-tmpfiles runs this as part of local-fs.target.
#
# Type  Path                    Mode  User   Group  Age
d       /data/home              0755  root   root   -
d       /data/home/admin        0755  admin  admin  -
d       /data/home/admin/bin    0755  admin  admin  -
d       /data/home/admin/.config 0700 admin  admin  -
