# Create /data subdirectories used by bootconf and other services.
# Runs after /data is mounted; bootconf relies on these existing.
#
# Type  Path                     Mode  User  Group  Age
d       /data/home               0755  root  root   -
d       /data/config/sudo        0750  root  root   -
d       /data/config/users       0755  root  root   -
d       /data/config/services    0755  root  root   -
d       /data/extensions         0755  root  root   -
d       /data/extensions/sysext  0755  root  root   -
d       /data/extensions/confext 0755  root  root   -
d       /data/coredumps          0750  root  root   -
L+      /var/lib/systemd/coredump -    -     -      - /data/coredumps
