[Manager]
# Make /usr/lib/framework/bin available to all systemd services so that
# init scripts can do "source framework || exit 1" without a full login shell.
DefaultEnvironment=PATH=/usr/lib/framework/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
