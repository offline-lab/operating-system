[Service]
# Reset terminal on restart so echo/icanon are sane after logout.
# The upstream unit uses --noreset which inherits the shell's raw-mode
# settings when agetty restarts; this drop-in removes that flag.
ExecStart=
ExecStart=-/sbin/agetty --noclear --issue-file=/etc/issue:/etc/issue.d:/run/issue.d:/usr/lib/issue.d --keep-baud 115200,57600,38400,9600 - $TERM
