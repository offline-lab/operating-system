# /etc/boxctl/su.conf — boxctl-su command allowlist
#
# Commands listed here may be executed via:   sudo boxctl-su <command> [args...]
# This file must be owned by root and not world-writable (mode 0644 or stricter).
#
# One entry per line — either a full path or a bare command name.
# Bare names are resolved via PATH at runtime and matched against their full path.
# Lines starting with # and blank lines are ignored.

# System control
systemctl
hostnamectl
timedatectl

# OTA updates (RAUC)
rauc

# Portable services
portablectl

# Network
ip
wpa_cli

# Storage
mount
umount
blkid

# Diagnostics
dmesg

# AppArmor
apparmor_parser
aa-status

# Power
reboot
halt
poweroff
shutdown
